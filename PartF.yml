# Play 1: Create TestUser1 on Test_Box_1
- name: Create TestUser1 on Test_Box_1
  hosts: 10.10.1.56
  become: yes
  gather_facts: false

  tasks:
    - name: Create TestUser1 with sudo/admin rights
      user:
        name: TestUser1
        password: "{{ 'WGU123' | password_hash('sha512') }}"
        groups: sudo
        append: yes
        shell: /bin/bash
        state: present

